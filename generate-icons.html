<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }
    h1 { color: #6366f1; }
    .icons { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
    .icon-item { text-align: center; }
    canvas { border: 1px solid #e2e8f0; border-radius: 8px; }
    .size { font-size: 12px; color: #64748b; margin-top: 5px; }
    button {
      background: #6366f1;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #4f46e5; }
    .success { color: #22c55e; margin-top: 20px; }
    .instructions {
      background: #f8fafc;
      padding: 20px;
      border-radius: 8px;
      text-align: left;
      margin-top: 30px;
    }
    .instructions ol { padding-left: 20px; }
    .instructions li { margin: 10px 0; }
  </style>
</head>
<body>
  <h1>Ticket Generator Icons</h1>
  <p>Click the button below to generate and download all icon sizes.</p>

  <div class="icons" id="icons"></div>

  <button onclick="downloadAll()">Download All Icons</button>
  <button onclick="generateIcons()">Regenerate</button>

  <p class="success" id="status"></p>

  <div class="instructions">
    <h3>Instructions:</h3>
    <ol>
      <li>Click "Download All Icons" to download all 4 icon sizes</li>
      <li>Move the downloaded files to the <code>icons</code> folder in your extension directory</li>
      <li>Reload the extension in Chrome</li>
    </ol>
  </div>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(ctx, size) {
      const scale = size / 128;

      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#6366f1');
      gradient.addColorStop(1, '#4338ca');

      // Rounded rectangle background
      const radius = size * 0.15;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Ticket icon
      ctx.strokeStyle = 'white';
      ctx.fillStyle = 'white';
      ctx.lineWidth = size * 0.06;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Ticket outline
      const padding = size * 0.2;
      const ticketWidth = size - (padding * 2);
      const ticketHeight = size - (padding * 2);
      const ticketRadius = size * 0.08;

      ctx.beginPath();
      ctx.moveTo(padding + ticketRadius, padding);
      ctx.lineTo(padding + ticketWidth - ticketRadius, padding);
      ctx.quadraticCurveTo(padding + ticketWidth, padding, padding + ticketWidth, padding + ticketRadius);
      ctx.lineTo(padding + ticketWidth, padding + ticketHeight - ticketRadius);
      ctx.quadraticCurveTo(padding + ticketWidth, padding + ticketHeight, padding + ticketWidth - ticketRadius, padding + ticketHeight);
      ctx.lineTo(padding + ticketRadius, padding + ticketHeight);
      ctx.quadraticCurveTo(padding, padding + ticketHeight, padding, padding + ticketHeight - ticketRadius);
      ctx.lineTo(padding, padding + ticketRadius);
      ctx.quadraticCurveTo(padding, padding, padding + ticketRadius, padding);
      ctx.closePath();
      ctx.stroke();

      // Horizontal line (header separator)
      const lineY = padding + (ticketHeight * 0.35);
      ctx.beginPath();
      ctx.moveTo(padding, lineY);
      ctx.lineTo(padding + ticketWidth, lineY);
      ctx.stroke();

      // Vertical line (stub separator)
      const stubX = padding + (ticketWidth * 0.25);
      ctx.beginPath();
      ctx.moveTo(stubX, padding);
      ctx.lineTo(stubX, lineY);
      ctx.stroke();

      // Bullet lines (ticket content)
      if (size >= 32) {
        ctx.lineWidth = size * 0.04;
        const bulletStartX = padding + (ticketWidth * 0.15);
        const bulletEndX = padding + (ticketWidth * 0.85);
        const bulletY1 = lineY + (ticketHeight * 0.2);
        const bulletY2 = lineY + (ticketHeight * 0.35);
        const bulletY3 = lineY + (ticketHeight * 0.5);

        // Bullet dots
        const dotRadius = size * 0.025;
        ctx.beginPath();
        ctx.arc(bulletStartX, bulletY1, dotRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(bulletStartX, bulletY2, dotRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(bulletStartX, bulletY3, dotRadius, 0, Math.PI * 2);
        ctx.fill();

        // Lines
        ctx.beginPath();
        ctx.moveTo(bulletStartX + size * 0.08, bulletY1);
        ctx.lineTo(bulletEndX, bulletY1);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(bulletStartX + size * 0.08, bulletY2);
        ctx.lineTo(bulletEndX * 0.8, bulletY2);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(bulletStartX + size * 0.08, bulletY3);
        ctx.lineTo(bulletEndX * 0.9, bulletY3);
        ctx.stroke();
      }

      // Checkmark in corner
      if (size >= 48) {
        const checkSize = size * 0.2;
        const checkX = padding + ticketWidth - checkSize * 0.3;
        const checkY = padding + ticketHeight - checkSize * 0.3;

        ctx.lineWidth = size * 0.05;
        ctx.beginPath();
        ctx.moveTo(checkX - checkSize * 0.4, checkY - checkSize * 0.1);
        ctx.lineTo(checkX - checkSize * 0.15, checkY + checkSize * 0.15);
        ctx.lineTo(checkX + checkSize * 0.25, checkY - checkSize * 0.35);
        ctx.stroke();
      }
    }

    function generateIcons() {
      const container = document.getElementById('icons');
      container.innerHTML = '';

      sizes.forEach(size => {
        const wrapper = document.createElement('div');
        wrapper.className = 'icon-item';

        const canvas = document.createElement('canvas');
        canvas.id = `icon${size}`;
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext('2d');
        drawIcon(ctx, size);

        const sizeLabel = document.createElement('div');
        sizeLabel.className = 'size';
        sizeLabel.textContent = `${size}x${size}`;

        wrapper.appendChild(canvas);
        wrapper.appendChild(sizeLabel);
        container.appendChild(wrapper);
      });
    }

    function downloadIcon(size) {
      const canvas = document.getElementById(`icon${size}`);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      sizes.forEach((size, index) => {
        setTimeout(() => downloadIcon(size), index * 200);
      });
      document.getElementById('status').textContent = 'Icons downloaded! Move them to the icons/ folder.';
    }

    // Generate icons on load
    generateIcons();
  </script>
</body>
</html>
